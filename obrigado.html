  <meta charset="UTF-8" />

  <title>Cersan Fibras Agradece</title>

  <!-- Fonte Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background-color: #f7f7f7;
      color: #222;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #1F4125;
      color: #fff;
      padding: 0px;
      text-align: center;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .thank-you-box {
      background-color: #fff;
      padding: 50px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    .thank-you-box h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
    }

    .thank-you-box p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
    }

    footer {
      background-color: #1F4125;
      color: #fff;
      text-align: center;
      padding: 16px 20px;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .thank-you-box {
        padding: 40px 20px;
      }

      .thank-you-box h2 {
        font-size: 2rem;
      }

      .thank-you-box p {
        font-size: 1rem;
      }

      header h1 {
        font-size: 1rem;
      }

      footer {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <img width="150px" src="./assets/cersan-white-Dqe9KME3.png" alt="logo">
  </header>

  <main>
    <section class="thank-you-box">
      <h2>Obrigado!</h2>
      <p>Nossa equipe entrará em contato em breve para dar andamento.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 Cersan Fibras - Todos os direitos reservados.</p>
  </footer>

</body>
</html>
